id: discovery
name: Discovery
version: 1.0.0
category: foundation
description: Process discovery — DFG, Petri nets (Alpha / Inductive miners), Process Tree, Heuristics Net.
author: Flows & Funds Core
license: MIT
default_enabled: true

requirements:
  event_log:
    required_columns:
      - case_id
      - activity
      - timestamp
    min_events: 50
    min_cases: 2

provides:
  - discovery.dfg
  - discovery.petri_net.alpha
  - discovery.petri_net.inductive
  - discovery.process_tree
  - discovery.heuristics_net

consumes:
  - log.imported

dependencies:
  python:
    requires-python: ">=3.12"
    packages: []
    inherit:
      - pm4py
      - pandas
      - duckdb
    isolation: in_process

frontend:
  panel: ./panel/index.tsx

permissions:
  - read:event_log
  - write:module_results

config_schema:
  properties:
    heuristics_dependency_threshold:
      type: number
      title: Dependency threshold
      description: Minimum |a→b| / (|a→b| + |b→a|) for an arc to be kept by the Heuristics miner.
      minimum: 0
      maximum: 1
      step: 0.05
      default: 0.5
      ui:
        widget: slider
        group: viz
        affects: compute
    heuristics_and_threshold:
      type: number
      title: AND threshold
      description: Threshold above which two outgoing arcs from the same activity are treated as concurrent.
      minimum: 0
      maximum: 1
      step: 0.05
      default: 0.65
      ui:
        widget: slider
        group: viz
        affects: compute
    heuristics_loop_two_threshold:
      type: number
      title: Loop-two threshold
      description: Threshold for detecting length-2 loops (a→b→a).
      minimum: 0
      maximum: 1
      step: 0.05
      default: 0.5
      ui:
        widget: slider
        group: viz
        affects: compute
