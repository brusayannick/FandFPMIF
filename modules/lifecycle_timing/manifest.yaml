id: lifecycle_timing
name: Lifecycle Timing
version: 0.1.0
category: attribute
description: Activity lifecycle (start / complete / suspend) timing analysis.
author: Flows & Funds Core
license: MIT
default_enabled: false

requirements:
  event_log:
    required_columns:
      - case_id
      - activity
      - timestamp
    optional_columns:
      - lifecycle_state
      - end_timestamp
    min_events: 100

provides:
  - lifecycle.transitions
  - lifecycle.duration_per_state

consumes:
  - log.imported

dependencies:
  python:
    requires-python: ">=3.12"
    packages: []
    inherit:
      - pm4py
      - pandas
      - duckdb
    isolation: in_process

permissions:
  - read:event_log
  - write:module_results
