id: cv4cdd
name: CV4CDD — Concept Drift Detection
version: 1.0.0
category: advanced
description: Computer-vision approach for concept drift detection. Identifies sudden, gradual, incremental, and recurring drifts via a fine-tuned object-detection model on a similarity-matrix encoding of the event log.
author: A. Kraus and H. van der Aa
license: CC-BY-4.0
default_enabled: false

requirements:
  event_log:
    required_columns:
      - case_id
      - activity
      - timestamp
    min_events: 200
    min_cases: 20

provides:
  - cv4cdd.detect

consumes:
  - log.imported

dependencies:
  python:
    requires-python: ">=3.12"
    packages:
      # Keep this list minimal — every extra package risks dragging a numpy
      # build that doesn't match the platform's. scipy + matplotlib were
      # replaced by a small bit of inline numpy code + a hardcoded viridis
      # LUT in cv4cdd_core.py so they don't need to be installed.
      - "tensorflow>=2.18,<2.21"
      - "Pillow>=10.0"
    inherit:
      - pm4py
      - pandas
      - numpy
      - duckdb
    isolation: in_process

frontend:
  panel: ./panel/index.tsx

permissions:
  - read:event_log
  - write:module_results

config_schema:
  properties:
    n_windows:
      type: integer
      title: Number of windows
      description: Number of sliding windows for the WINSIM encoding. The model was trained at 200 — change only if your log has very few cases.
      minimum: 50
      maximum: 500
      default: 200
      ui:
        widget: number
        affects: compute
    confidence_threshold:
      type: number
      title: Detection confidence threshold
      description: Minimum confidence score (0–1) for a drift detection to be reported.
      minimum: 0.1
      maximum: 0.95
      step: 0.05
      default: 0.5
      ui:
        widget: slider
        affects: compute
