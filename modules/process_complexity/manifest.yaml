id: process_complexity
name: Process Complexity
version: 1.0.0
category: advanced
description: EPA-based variant/sequence entropy, Lempel-Ziv, affinity, structure, Pentland metrics, and temporal drift analysis.
author: FlowFactory
license: MIT
default_enabled: true

requirements:
  event_log:
    required_columns:
      - case_id
      - activity
      - timestamp
    min_events: 100

provides:
  - complexity.variant_entropy
  - complexity.sequence_entropy
  - complexity.lempel_ziv
  - complexity.affinity
  - complexity.structure
  - complexity.pentland
  - complexity.temporal
  - complexity.correlations

consumes:
  - log.imported

dependencies:
  python:
    requires-python: ">=3.12"
    packages: []
    inherit:
      - numpy
      - pm4py
      - pandas
      - duckdb
    isolation: in_process

frontend:
  panel: ./panel/index.tsx

config_schema:
  properties:
    temporal_window:
      type: string
      enum:
        - day
        - week
        - month
      default: week
      ui:
        widget: select
        label: Temporal window
    forgetting_factor:
      type: number
      minimum: 0.0
      maximum: 1.0
      default: 0.5
      ui:
        widget: slider
        label: Sequence entropy forgetting factor

permissions:
  - read:event_log
  - write:module_results
