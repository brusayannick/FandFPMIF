[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flows-funds-sdk"
version = "0.1.0"
description = "Module SDK for Flows & Funds — public API for module authors."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "structlog>=24.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/flows_funds"]

[tool.hatch.build.targets.sdist]
include = ["src/flows_funds"]
